<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Render</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.5;
            color: #2c3e50;
            background: white;
        }

        /* ============================================
           BASE STYLES (shared portrait + landscape)
           ============================================ */
        .preview-container {
            margin: 0 auto; overflow: hidden;
            min-height: 100vh;
            display: flex; flex-direction: column;
        }

        .preview-header { color: white; text-align: center; position: relative; }
        .preview-header::before { content: '\26A0\FE0F'; display: block; }
        .preview-header.hide-icon::before { display: none; }
        .preview-header h1 { font-weight: 900; text-shadow: 2px 2px 4px rgba(0,0,0,0.4); letter-spacing: 2px; }
        .preview-header p { opacity: 0.95; font-weight: 500; }

        .preview-header .logo, .preview-footer .logo {
            position: absolute; max-height: 80px; z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        .preview-header .logo.top-left { left: 20px; top: 20px; }
        .preview-header .logo.top-right { right: 20px; top: 20px; }
        .preview-header .logo.top-center { left: 50%; top: 20px; transform: translateX(-50%); }
        .preview-footer .logo.bottom-left { left: 20px; bottom: 15px; }
        .preview-footer .logo.bottom-right { right: 20px; bottom: 15px; }
        .preview-footer .logo.bottom-center { left: 50%; bottom: 15px; transform: translateX(-50%); }

        .preview-timeline { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; }
        .preview-timeline-item { color: white; border-radius: 30px; font-weight: 700; box-shadow: 0 3px 10px rgba(0,0,0,0.2); }

        .preview-steps-grid { display: grid; flex: 1; align-content: start; }
        .preview-step {
            background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border-left: 6px solid; position: relative;
        }
        .preview-step-number {
            position: absolute; color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .preview-step h3 { color: #2c3e50; font-weight: 800; line-height: 1.2; }
        .preview-action-item {
            border-radius: 10px; border-left: 4px solid; font-weight: 600;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }
        .preview-emergency-contact {
            color: white; border-radius: 12px; text-align: center;
            font-weight: 700; box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .preview-footer { color: white; text-align: center; position: relative; margin-top: auto; }

        /* ============================================
           PORTRAIT MODE (default)
           ============================================ */
        body.portrait .preview-container { max-width: 1200px; }

        body.portrait .preview-header { padding: 45px 30px; }
        body.portrait .preview-header::before { font-size: 70px; margin-bottom: 20px; }
        body.portrait .preview-header h1 { font-size: 2.8em; margin-bottom: 12px; }
        body.portrait .preview-header p { font-size: 1.2em; }

        body.portrait .preview-timeline { margin: 25px 0; padding: 0 20px; }
        body.portrait .preview-timeline-item { padding: 10px 22px; margin: 6px; font-size: 0.95em; }

        body.portrait .preview-steps-grid {
            grid-template-columns: repeat(2, 1fr);
            gap: 30px; padding: 40px;
        }
        body.portrait .preview-step { padding: 30px; }
        body.portrait .preview-step-number { top: -18px; left: 22px; width: 44px; height: 44px; font-size: 1.3em; }
        body.portrait .preview-step-icon { font-size: 3.5em; margin-bottom: 20px; }
        body.portrait .preview-step h3 { font-size: 1.4em; margin-bottom: 16px; }
        body.portrait .preview-action-item { padding: 14px; margin: 12px 0; font-size: 0.95em; }

        body.portrait .preview-emergency-contact { padding: 25px; margin: 25px 40px; font-size: 1.1em; }
        body.portrait .preview-footer { padding: 35px 25px; line-height: 1.5; font-size: 1em; }

        /* ============================================
           LANDSCAPE MODE
           ============================================ */
        body.landscape .preview-container { max-width: none; }

        /* Compact header: smaller, tighter */
        body.landscape .preview-header { padding: 25px 30px; }
        body.landscape .preview-header::before { font-size: 45px; margin-bottom: 8px; }
        body.landscape .preview-header h1 { font-size: 2em; margin-bottom: 6px; }
        body.landscape .preview-header p { font-size: 1em; }
        body.landscape .preview-header .logo { max-height: 60px; }

        /* Timeline: compact inline */
        body.landscape .preview-timeline { margin: 12px 0; padding: 0 15px; }
        body.landscape .preview-timeline-item { padding: 6px 14px; margin: 3px; font-size: 0.8em; }

        /* Steps: all on one row, or auto-fit with larger min */
        body.landscape .preview-steps-grid {
            gap: 18px; padding: 20px 25px;
        }
        body.landscape .preview-step { padding: 18px 16px; border-radius: 12px; }
        body.landscape .preview-step-number { top: -14px; left: 14px; width: 34px; height: 34px; font-size: 1em; }
        body.landscape .preview-step-icon { font-size: 2em; margin-bottom: 10px; }
        body.landscape .preview-step h3 { font-size: 1em; margin-bottom: 8px; }
        body.landscape .preview-action-item { padding: 8px 10px; margin: 6px 0; font-size: 0.78em; border-left-width: 3px; }

        /* Compact emergency + footer */
        body.landscape .preview-emergency-contact { padding: 14px; margin: 12px 20px; font-size: 0.9em; border-radius: 8px; }
        body.landscape .preview-footer { padding: 18px 25px; font-size: 0.85em; line-height: 1.4; }
        body.landscape .preview-footer .logo { max-height: 45px; }

        /* ============================================
           FRAME MODE (préviz interactive dans l'éditeur)
           ============================================ */
        body.frame-mode [data-edit] { cursor: pointer; }
        body.frame-mode [data-edit]:hover {
            outline: 2px dashed rgba(0, 86, 179, 0.65);
            outline-offset: 2px;
        }
        body.frame-mode [data-edit].ig-selected {
            outline: 3px solid #0056b3;
            outline-offset: 2px;
        }
        body.frame-mode [data-edit].ig-editing {
            outline: 3px solid #27ae60;
            outline-offset: 2px;
            cursor: text;
            min-width: 40px;
            min-height: 1em;
        }
        body.frame-mode [data-edit].ig-editing:hover { outline-color: #27ae60; }

        /* Barre de style flottante (édition rich text) */
        #ig-toolbar {
            position: fixed;
            display: none;
            z-index: 9999;
            background: #2c3e50;
            border-radius: 8px;
            padding: 4px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.35);
            gap: 2px;
        }
        #ig-toolbar button {
            border: 0;
            background: transparent;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
        }
        #ig-toolbar button:hover { background: rgba(255,255,255,0.18); }
        #ig-toolbar button.b { font-weight: 900; }
        #ig-toolbar button.i { font-style: italic; }
        #ig-toolbar button.u { text-decoration: underline; }
        #ig-toolbar button.s { text-decoration: line-through; }
    </style>
</head>
<body>
    <div id="render-root"></div>
<body>
    <div id="render-root"></div>
    <div id="infographic-ready" style="display:none;"></div>
    <div id="ig-toolbar">
        <button class="b" data-cmd="bold" title="Gras (Ctrl+B)">B</button>
        <button class="i" data-cmd="italic" title="Italique (Ctrl+I)">I</button>
        <button class="u" data-cmd="underline" title="Souligne (Ctrl+U)">U</button>
        <button class="s" data-cmd="strikeThrough" title="Barre">S</button>
    </div>

    <script>
        /* ==========================================================================
           MOTEUR DE RENDU UNIQUE
           --------------------------------------------------------------------------
           Cette page est utilisée dans TROIS contextes, sans divergence possible :
             1. /render/{id}       : capture chromedp (exports PNG / PDF)
             2. export HTML        : fichier autonome auto-rendu (PROJECT embarqué)
             3. mode "frame"       : préviz interactive de l'éditeur (PROJECT null,
                                     rendu piloté par postMessage, socle WYSIWYG)

           Chaque élément éditable porte un attribut data-edit="chemin.dans.le.projet"
           qui cartographie le DOM vers le modèle de données. En mode frame, un clic
           envoie ce chemin à l'éditeur (sélection) ; c'est la fondation de
           l'édition in-place à venir.
           ========================================================================== */

        const PROJECT = "%%PROJECT_DATA%%";

        // Paramètres d'affichage (URL en priorité, puis valeur embarquée à l'export)
        const params = new URLSearchParams(window.location.search);
        let orientation = params.get('orientation')
            || window.EXPORT_ORIENTATION
            || 'portrait';
        const fitMode = params.get('fit') === '1';       // mise à l'échelle capture
        const frameMode = (PROJECT === null);            // préviz éditeur

        let currentProject = frameMode ? null : PROJECT;
        let selectedPath = null;

        // Colonnes en paysage : 1→1, 2→2, 3-9→3, >9→4.
        function getLandscapeCols(n) {
            if (n <= 1) return 1;
            if (n === 2) return 2;
            if (n <= 9) return 3;
            return 4;
        }

        const dynStyle = document.createElement('style');
        document.head.appendChild(dynStyle);

        function applyOrientation() {
            document.body.className = orientation + (frameMode ? ' frame-mode' : '');
            const steps = (currentProject && currentProject.elements && currentProject.elements.steps)
                ? currentProject.elements.steps.length : 4;
            dynStyle.textContent = (orientation === 'landscape')
                ? `body.landscape .preview-steps-grid { grid-template-columns: repeat(${getLandscapeCols(steps)}, 1fr); }`
                : '';
        }

        /* --- Résolution des couleurs (miroir strict de l'éditeur) --- */
        const categoryPresets = {
            immediate:     { border: '#e74c3c', background: '#ffffff', text: '#2c3e50' },
            management:    { border: '#0056b3', background: '#ffffff', text: '#2c3e50' },
            communication: { border: '#f39c12', background: '#ffffff', text: '#2c3e50' },
            continuity:    { border: '#27ae60', background: '#ffffff', text: '#2c3e50' }
        };
        const actionTypePresets = {
            critical:  { border: '#e74c3c', background: 'rgba(231, 76, 60, 0.08)' },
            important: { border: '#f39c12', background: 'rgba(243, 156, 18, 0.08)' },
            info:      { border: '#3498db', background: 'rgba(52, 152, 219, 0.08)' },
            success:   { border: '#27ae60', background: 'rgba(39, 174, 96, 0.08)' }
        };

        function getStepColor(step, type) {
            if (step.customColors && step.customColors[type]) return step.customColors[type];
            const preset = categoryPresets[step.category];
            if (preset && preset[type]) return preset[type];
            return { border: '#3498db', background: '#ffffff', text: '#2c3e50' }[type] || '#ffffff';
        }
        function getActionColor(action, type) {
            const preset = actionTypePresets[action.type];
            if (preset && preset[type]) return preset[type];
            return type === 'border' ? '#3498db' : 'rgba(52,152,219,0.08)';
        }
        function adjustBrightness(hex, amount) {
            if (!hex || hex.length !== 7) return hex;
            const num = parseInt(hex.slice(1), 16);
            let r = Math.min(255, Math.max(0, (num >> 16) + amount));
            let g = Math.min(255, Math.max(0, ((num >> 8) & 0xFF) + amount));
            let b = Math.min(255, Math.max(0, (num & 0xFF) + amount));
            return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
        }
        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        /* --- Sanitizer : même liste blanche que l'éditeur et le serveur --- */
        const ALLOWED_RENDER_TAGS = {
            STRONG:[], B:[], EM:[], I:[], U:[], S:[], STRIKE:[], BR:[],
            P:['style'], DIV:['style'], SPAN:['style'],
            LABEL:[], INPUT:['type','checked','disabled']
        };
        const ALLOWED_RENDER_STYLES = ['color','text-align','font-weight','font-style','text-decoration'];
        function sanitizeRenderHTML(dirty) {
            if (!dirty) return '';
            const tmpl = document.createElement('template');
            tmpl.innerHTML = String(dirty).replace(/\n/g, '<br>');
            sanitizeRenderNode(tmpl.content);
            return tmpl.innerHTML;
        }
        function sanitizeRenderNode(node) {
            const kids = Array.from(node.childNodes);
            for (const k of kids) {
                if (k.nodeType === 3) continue;
                if (k.nodeType !== 1) { k.remove(); continue; }
                const tag = k.tagName;
                if (!ALLOWED_RENDER_TAGS[tag]) {
                    while (k.firstChild) k.parentNode.insertBefore(k.firstChild, k);
                    k.remove();
                    continue;
                }
                if (tag === 'INPUT') {
                    const type = (k.getAttribute('type') || '').toLowerCase();
                    if (type !== 'checkbox') { k.remove(); continue; }
                }
                const allowed = ALLOWED_RENDER_TAGS[tag];
                for (const attr of Array.from(k.attributes)) {
                    const name = attr.name.toLowerCase();
                    if (!allowed.includes(name)) { k.removeAttribute(attr.name); continue; }
                    if (name === 'style') {
                        const clean = sanitizeRenderStyle(attr.value);
                        if (clean) k.setAttribute('style', clean);
                        else k.removeAttribute('style');
                    }
                    if (tag === 'INPUT' && name === 'type') k.setAttribute('type', 'checkbox');
                }
                sanitizeRenderNode(k);
            }
        }
        function sanitizeRenderStyle(s) {
            if (!s) return '';
            const out = [];
            for (const decl of s.split(';')) {
                const i = decl.indexOf(':');
                if (i < 0) continue;
                const prop = decl.slice(0, i).trim().toLowerCase();
                const val = decl.slice(i + 1).trim();
                if (!ALLOWED_RENDER_STYLES.includes(prop)) continue;
                if (/expression\s*\(|url\s*\(|@import|javascript:/i.test(val)) continue;
                if (!/^[a-zA-Z0-9#.,()\s%\-_']+$/.test(val)) continue;
                out.push(`${prop}:${val}`);
            }
            return out.join(';');
        }

        /* --- Attribut de sélection (cartographie DOM -> modèle) --- */
        function editAttr(path) {
            // Émis uniquement en mode frame : les exports restent du HTML pur.
            return frameMode ? ` data-edit="${path}"` : '';
        }

        /* ==========================================================================
           RENDU
           ========================================================================== */
        function render() {
            const p = currentProject;
            if (!p) return;
            const c = p.theme.colors;
            const fontSize = (p.theme && p.theme.fontSize) ? p.theme.fontSize : 100;
            const fontFamily = (p.theme && p.theme.fontFamily && p.theme.fontFamily !== 'system') ? p.theme.fontFamily : '';
            let html = '';

            document.title = (p.content && p.content.title) ? p.content.title : 'Infographie';
            // Le fond de page = couleur de fond du projet (visible autour de
            // l'affiche et dans les marges des captures au ratio papier).
            document.body.style.background = c.background || '#f8f9fa';

            applyOrientation();

            const headerClass = p.content.showHeaderIcon ? 'preview-header' : 'preview-header hide-icon';
            const fontStyle = fontFamily ? `;font-family:${fontFamily}` : '';
            html += `<div class="preview-container" style="background:${c.contentBg};font-size:${fontSize}%${fontStyle}">`;
            html += `<div class="${headerClass}"${editAttr('theme.colors.header')} style="background:linear-gradient(135deg,${c.header},${adjustBrightness(c.header,-20)})">`;

            (p.elements.logos || []).forEach((logo, i) => {
                const src = logo.file || logo.url;
                if (src && logo.position && logo.position.startsWith('top')) {
                    html += `<img src="${esc(src)}" class="logo ${logo.position}"${editAttr('elements.logos.' + i)} style="max-width:${logo.size}px" alt="Logo">`;
                }
            });
            html += `<h1${editAttr('content.title')}>${sanitizeRenderHTML(p.content.title)}</h1>`;
            html += `<p${editAttr('content.subtitle')}>${sanitizeRenderHTML(p.content.subtitle)}</p></div>`;

            if (p.elements.timeline && p.elements.timeline.length) {
                html += `<div class="preview-timeline"${editAttr('theme.colors.timeline')}>`;
                p.elements.timeline.forEach((item, i) => {
                    if (item.type === 'item') {
                        html += `<div class="preview-timeline-item"${editAttr('elements.timeline.' + i)} style="background:linear-gradient(135deg,${c.timeline},${adjustBrightness(c.timeline,-15)})">${esc(item.text)}</div>`;
                    } else {
                        html += `<div class="preview-timeline-item"${editAttr('elements.timeline.' + i)} style="background:transparent;color:${c.timeline};font-size:1.2em;">${esc(item.text)}</div>`;
                    }
                });
                html += '</div>';
            }

            html += `<div class="preview-steps-grid" style="background:${c.contentBg}">`;
            (p.elements.steps || []).forEach((step, index) => {
                const bc = getStepColor(step, 'border');
                const bg = getStepColor(step, 'background');
                const tc = getStepColor(step, 'text');
                html += `<div class="preview-step"${editAttr('elements.steps.' + index)} style="border-left-color:${bc};background:${bg};color:${tc}">`;
                html += `<div class="preview-step-number" style="background:linear-gradient(135deg,${c.stepNumber},${adjustBrightness(c.stepNumber,-20)})">${index + 1}</div>`;
                html += `<div class="preview-step-icon"${editAttr('elements.steps.' + index + '.icon')}>${esc(step.icon)}</div>`;
                html += `<h3${editAttr('elements.steps.' + index + '.title')} style="color:${tc}">${esc(step.title)}</h3><div>`;
                (step.actions || []).forEach((action, j) => {
                    const ab = getActionColor(action, 'border');
                    const abg = getActionColor(action, 'background');
                    html += `<div class="preview-action-item"${editAttr('elements.steps.' + index + '.actions.' + j + '.text')} style="border-left-color:${ab};background:${abg};color:#2c3e50">${sanitizeRenderHTML(action.text)}</div>`;
                });
                html += '</div></div>';
            });
            html += '</div>';

            if (p.content.emergencyMessage) {
                html += `<div class="preview-emergency-contact"${editAttr('content.emergencyMessage')} style="background:linear-gradient(135deg,${c.emergency},${adjustBrightness(c.emergency,-20)})">${sanitizeRenderHTML(p.content.emergencyMessage)}</div>`;
            }

            html += `<div class="preview-footer"${editAttr('theme.colors.footer')} style="background:linear-gradient(135deg,${c.footer},${adjustBrightness(c.footer,-15)})">`;
            (p.elements.logos || []).forEach((logo, i) => {
                const src = logo.file || logo.url;
                if (src && logo.position && logo.position.startsWith('bottom')) {
                    html += `<img src="${esc(src)}" class="logo ${logo.position}"${editAttr('elements.logos.' + i)} style="max-width:${logo.size}px" alt="Logo">`;
                }
            });
            html += `<div${editAttr('content.footerMessage')}>${sanitizeRenderHTML(p.content.footerMessage)}</div>`;
            html += '</div></div>';

            document.getElementById('render-root').innerHTML = html;
            restoreSelection();
        }

        /* ==========================================================================
           ANTI-TRONCATURE (captures PNG/PDF au ratio papier : ?fit=1)
           --------------------------------------------------------------------------
           Le viewport de capture est calé sur le ratio exact du papier. Si le
           contenu est plus haut que le viewport, il serait purement coupé.
           Ici : mesure après chargement des images, puis mise à l'échelle
           uniforme pour que TOUT le contenu tienne dans la capture.
           ========================================================================== */
        function waitForImages(timeoutMs) {
            const imgs = Array.from(document.images);
            if (!imgs.length) return Promise.resolve();
            return Promise.all(imgs.map(img => img.complete
                ? Promise.resolve()
                : new Promise(res => {
                    img.addEventListener('load', res, { once: true });
                    img.addEventListener('error', res, { once: true });
                    setTimeout(res, timeoutMs);
                })
            ));
        }

        function applyFit() {
            if (!fitMode) return;
            const cont = document.querySelector('.preview-container');
            if (!cont) return;
            // Réinitialiser une éventuelle passe précédente
            cont.style.transform = '';
            cont.style.marginTop = '';
            const vw = window.innerWidth, vh = window.innerHeight;
            const rect = cont.getBoundingClientRect();
            const cw = rect.width, ch = rect.height;
            const s = Math.min(1, vw / cw, vh / ch);
            if (s < 1) {
                cont.style.transformOrigin = 'top center';
                cont.style.transform = `scale(${s})`;
            }
            // Centrage vertical du visuel dans la capture
            const visualH = ch * s;
            const offset = Math.max(0, (vh - visualH) / 2);
            if (offset > 0) cont.style.marginTop = offset + 'px';

            // Le transform est purement visuel : la boîte de layout garde sa
            // hauteur d'origine. Sans bornage, printToPDF paginerait sur cette
            // hauteur fantôme (page 2 vide). On clippe le document au viewport.
            // NB : overflow doit être posé sur html ET body. Posé sur body seul,
            // la spec CSS le propage au viewport et body redevient "visible" —
            // l'impression paginerait alors sur le débordement.
            document.documentElement.style.height = vh + 'px';
            document.documentElement.style.overflow = 'hidden';
            document.body.style.height = vh + 'px';
            document.body.style.overflow = 'hidden';
        }

        function signalReady() {
            // Marqueur attendu par chromedp : bloc 1x1 réellement "visible".
            const m = document.getElementById('infographic-ready');
            m.style.cssText = 'display:block;position:fixed;left:0;top:0;width:1px;height:1px;opacity:0.01;';
        }

        /* ==========================================================================
           MODE FRAME : protocole postMessage avec l'éditeur (socle WYSIWYG)
           --------------------------------------------------------------------------
           Éditeur -> frame : { type:'ig-render', project, orientation }
           Frame -> éditeur : { type:'ig-ready' }
                              { type:'ig-select', path }   (clic sur un élément)
           ========================================================================== */
        function restoreSelection() {
            if (!frameMode || !selectedPath) return;
            const el = document.querySelector(`[data-edit="${CSS.escape(selectedPath)}"]`);
            if (el) el.classList.add('ig-selected');
        }

        /* ------------------------------------------------------------------
           ÉDITION IN-PLACE (mode frame uniquement)
           ------------------------------------------------------------------
           Chaque chemin éditable a une "nature" :
             - rich  : HTML limité (gras, italique... via liste blanche),
                       sauts de ligne <br> <-> \n dans le modèle
             - plain : texte brut mono-ligne
             - select: sélection seule (le panneau contextuel de l'éditeur
                       prend le relais : couleurs, positions, emoji...)
           ------------------------------------------------------------------ */
        function pathKind(path) {
            if (/^content\.(title|subtitle|emergencyMessage|footerMessage)$/.test(path)) return 'rich';
            if (/^elements\.steps\.\d+\.actions\.\d+\.text$/.test(path)) return 'rich';
            if (/^elements\.steps\.\d+\.title$/.test(path)) return 'plain';
            if (/^elements\.timeline\.\d+$/.test(path)) return 'timeline';
            return 'select';
        }

        let editingEl = null, editingPath = null, editingKind = null;
        let editTimer = null, pendingRender = null;
        const toolbar = document.getElementById('ig-toolbar');

        // Sérialise un contenu édité vers le format du modèle :
        // balises de la liste blanche conservées (avec style filtré),
        // <br> et blocs -> \n, texte échappé (chevrons uniquement).
        function serializeRich(root) {
            function walk(node) {
                let out = '';
                node.childNodes.forEach(n => {
                    if (n.nodeType === 3) {
                        out += n.textContent.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                        return;
                    }
                    if (n.nodeType !== 1) return;
                    const tag = n.tagName;
                    if (tag === 'BR') { out += '\n'; return; }
                    if (tag === 'DIV' || tag === 'P') {
                        // Blocs générés par contenteditable -> saut de ligne
                        if (out && !out.endsWith('\n')) out += '\n';
                        out += walk(n);
                        return;
                    }
                    if (tag === 'INPUT') {
                        const t = (n.getAttribute('type') || '').toLowerCase();
                        if (t === 'checkbox') out += `<input type="checkbox"${n.checked ? ' checked="checked"' : ''} />`;
                        return;
                    }
                    if (ALLOWED_RENDER_TAGS[tag]) {
                        const low = tag.toLowerCase();
                        let attrs = '';
                        if ((ALLOWED_RENDER_TAGS[tag] || []).includes('style')) {
                            const st = sanitizeRenderStyle(n.getAttribute('style') || '');
                            if (st) attrs = ` style="${st}"`;
                        }
                        out += `<${low}${attrs}>` + walk(n) + `</${low}>`;
                    } else {
                        out += walk(n); // balise inconnue : on garde le contenu
                    }
                });
                return out;
            }
            return walk(root).replace(/\u00a0/g, ' ').replace(/\n+$/, '');
        }

        function currentEditValue() {
            if (editingKind === 'plain') {
                return editingEl.textContent.replace(/\s*\n\s*/g, ' ').trim();
            }
            return serializeRich(editingEl);
        }

        function valuePathOf(path, kind) {
            return kind === 'timeline' ? path + '.text' : path;
        }

        function sendEdit() {
            if (!editingEl) return;
            window.parent.postMessage({
                type: 'ig-edit',
                path: valuePathOf(editingPath, editingKind),
                value: currentEditValue()
            }, '*');
        }

        function positionToolbar() {
            if (!editingEl) return;
            const r = editingEl.getBoundingClientRect();
            toolbar.style.display = 'flex';
            const top = Math.max(6, r.top - 44);
            let left = r.left + r.width / 2 - toolbar.offsetWidth / 2;
            left = Math.max(6, Math.min(left, window.innerWidth - toolbar.offsetWidth - 6));
            toolbar.style.top = top + 'px';
            toolbar.style.left = left + 'px';
        }

        function startInlineEdit(el, path, kind, x, y) {
            stopInlineEdit(true);
            editingEl = el; editingPath = path; editingKind = kind;
            el.setAttribute('contenteditable', 'true');
            el.classList.add('ig-editing');
            el.focus();
            // Placer le curseur au point cliqué
            try {
                const range = document.caretRangeFromPoint
                    ? document.caretRangeFromPoint(x, y)
                    : (document.caretPositionFromPoint
                        ? (() => { const p = document.caretPositionFromPoint(x, y);
                                   const r = document.createRange(); r.setStart(p.offsetNode, p.offset); return r; })()
                        : null);
                if (range) { const s = getSelection(); s.removeAllRanges(); s.addRange(range); }
            } catch (e) {}
            window.parent.postMessage({ type: 'ig-edit-start', path: editingPath }, '*');
            if (kind === 'rich') positionToolbar();
        }

        function stopInlineEdit(sendFinal) {
            if (!editingEl) return;
            if (sendFinal) sendEdit();
            clearTimeout(editTimer);
            editingEl.removeAttribute('contenteditable');
            editingEl.classList.remove('ig-editing');
            editingEl = null; editingPath = null; editingKind = null;
            toolbar.style.display = 'none';
            window.parent.postMessage({ type: 'ig-edit-end' }, '*');
            // Un rendu reçu pendant l'édition a été différé : l'appliquer
            if (pendingRender) {
                const msg = pendingRender; pendingRender = null;
                currentProject = msg.project;
                if (msg.orientation) orientation = msg.orientation;
                try { render(); } catch (e) { console.error('render:', e); }
            }
        }

        if (frameMode) {
            // Barre de style : execCommand s'applique à la sélection courante
            toolbar.addEventListener('mousedown', (ev) => ev.preventDefault());
            toolbar.addEventListener('click', (ev) => {
                const btn = ev.target.closest('button[data-cmd]');
                if (!btn || !editingEl) return;
                document.execCommand(btn.dataset.cmd, false, null);
                clearTimeout(editTimer);
                editTimer = setTimeout(sendEdit, 200);
            });

            // Frappe : envoi débouncé vers l'éditeur (le modèle suit en direct)
            document.addEventListener('input', (ev) => {
                if (!editingEl || ev.target !== editingEl) return;
                clearTimeout(editTimer);
                editTimer = setTimeout(sendEdit, 200);
                if (editingKind === 'rich') positionToolbar();
            });

            document.addEventListener('keydown', (ev) => {
                if (!editingEl) return;
                // Fin d'édition directe (ne pas dépendre de focusout : blur()
                // programmatique ne le déclenche pas toujours, notamment quand
                // la fenêtre n'a pas le focus).
                if (ev.key === 'Escape') { ev.preventDefault(); stopInlineEdit(true); return; }
                if (ev.key === 'Enter') {
                    ev.preventDefault();
                    if (editingKind === 'rich') {
                        document.execCommand('insertHTML', false, '<br>');
                    } else {
                        stopInlineEdit(true); // champs mono-ligne
                    }
                }
            }, true);

            // Collage en texte brut (pas de HTML étranger dans le modèle)
            document.addEventListener('paste', (ev) => {
                if (!editingEl) return;
                ev.preventDefault();
                const text = (ev.clipboardData || window.clipboardData).getData('text/plain');
                document.execCommand('insertText', false, text);
            }, true);

            document.addEventListener('focusout', (ev) => {
                if (editingEl && ev.target === editingEl) {
                    // Laisser passer les clics sur la toolbar (mousedown préventé)
                    setTimeout(() => { if (editingEl && document.activeElement !== editingEl) stopInlineEdit(true); }, 0);
                }
            });

            window.addEventListener('message', (ev) => {
                const msg = ev.data;
                if (!msg || typeof msg !== 'object') return;
                if (msg.type === 'ig-render' && msg.project) {
                    if (editingEl) { pendingRender = msg; return; } // ne pas casser la frappe
                    currentProject = msg.project;
                    if (msg.orientation) orientation = msg.orientation;
                    try { render(); } catch (e) { console.error('render:', e); }
                } else if (msg.type === 'ig-select-path') {
                    stopInlineEdit(true);
                    selectedPath = msg.path || null;
                    document.querySelectorAll('.ig-selected').forEach(el => el.classList.remove('ig-selected'));
                    restoreSelection();
                }
            });

            document.addEventListener('click', (ev) => {
                if (ev.target.closest('#ig-toolbar')) return;
                const target = ev.target.closest('[data-edit]');
                if (editingEl && target === editingEl) return; // clic dans le champ en cours
                if (editingEl) stopInlineEdit(true);
                if (!target) return;
                ev.preventDefault();
                selectedPath = target.getAttribute('data-edit');
                document.querySelectorAll('.ig-selected').forEach(el => el.classList.remove('ig-selected'));
                target.classList.add('ig-selected');
                window.parent.postMessage({ type: 'ig-select', path: selectedPath }, '*');

                // Édition directe pour les natures textuelles
                const kind = pathKind(selectedPath);
                if (kind === 'rich' || kind === 'plain') {
                    startInlineEdit(target, selectedPath, kind, ev.clientX, ev.clientY);
                } else if (kind === 'timeline') {
                    const ti = parseInt(selectedPath.split('.')[2], 10);
                    const item = currentProject && currentProject.elements.timeline[ti];
                    if (item && item.type === 'item') {
                        startInlineEdit(target, selectedPath, 'timeline', ev.clientX, ev.clientY);
                    }
                }
            });

            window.parent.postMessage({ type: 'ig-ready' }, '*');
        }

        /* ==========================================================================
           DÉMARRAGE (modes capture et fichier autonome)
           ========================================================================== */
        if (!frameMode) {
            try {
                render();
            } catch (e) {
                document.getElementById('render-root').innerHTML =
                    '<div style="padding:40px;color:red;">RENDER ERROR: ' + esc(e.message) + '</div>';
            }
            waitForImages(5000).then(() => {
                applyFit();
                // Double rAF : garantit un layout stabilisé avant le signal.
                requestAnimationFrame(() => requestAnimationFrame(signalReady));
            });
            window.addEventListener('resize', applyFit);
        }
    </script>
</body>
</html>
